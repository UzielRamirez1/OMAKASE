server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:servicio_social}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Mexico_City&characterEncoding=utf8
    username: ${DB_USERNAME:fes_user}
    password: ${DB_PASSWORD:fes_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  sql:
    init:
      mode: never

jwt:
  secret: ${JWT_SECRET:FesAragonMacrodatosSecretKeyJWT2024VeryLongKey256Bits!!}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    mx.unam.fesaragon: INFO
    org.springframework.security: WARN
