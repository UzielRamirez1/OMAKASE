<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Iniciar Sesión — Sistema FES Aragón</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="../static/css/main.css" th:href="@{/css/main.css}"/>
</head>
<body class="login-body">
<div class="login-container">
    <div class="login-card">
        <!-- Logo / Header -->
        <div class="login-header">
            <div class="login-logo">
                <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" width="52" height="52">
                    <rect width="48" height="48" rx="12" fill="#003F8A"/>
                    <path d="M12 34V20l12-8 12 8v14H28v-8h-8v8H12z" fill="white"/>
                </svg>
            </div>
            <h1 class="login-title">FES Aragón</h1>
            <p class="login-subtitle">Laboratorio de Macrodatos<br/>Sistema de Control de Horas</p>
        </div>

        <!-- Alertas -->
        <div th:if="${errorMsg}" class="alert alert-error" th:text="${errorMsg}"></div>
        <div th:if="${logoutMsg}" class="alert alert-success" th:text="${logoutMsg}"></div>

        <!-- Formulario -->
        <form action="/login" method="post" class="login-form" id="loginForm">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" placeholder="Ingresa tu usuario"
                       required autocomplete="username"/>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña"
                       required autocomplete="current-password"/>
            </div>
            <button type="submit" class="btn-login" id="btnLogin">
                <span>Iniciar Sesión</span>
            </button>
        </form>

        <!-- Credenciales de prueba -->
        <div class="login-hint">
            <p><strong>Usuarios de prueba:</strong></p>
            <p>Admin: <code>admin</code> / <code>Admin1234!</code></p>
            <p>Profesor: <code>profesor1</code> / <code>Prof1234!</code></p>
            <p>Alumno: <code>alumno1</code> / <code>Alum1234!</code></p>
        </div>

        <div class="login-footer">
            <p>Universidad Nacional Autónoma de México</p>
            <p>FES Aragón &copy; 2024</p>
        </div>
    </div>
</div>
</body>
</html>
